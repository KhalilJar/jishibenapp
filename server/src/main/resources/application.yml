server:
  port: 7070

spring:
  application:
    name: bookkeeping-server

  # H2 内嵌数据库配置（开发测试用）
  datasource:
    url: jdbc:h2:mem:bookkeeping
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  # MySQL 配置（部署时启用）
#  datasource:
#    url: jdbc:mysql://localhost:3306/jizhangben?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    username:  ${MYSQL_USERNAME}
#    password: ${MYSQL_PASSWORD}

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT 自定义配置
jwt:
  secret: ${JWT_SECRET:dev_secret_key_which_is_at_least_32_characters_long_123456}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
